<div 
  class="card" 
  [class.p-0]="noPadding"
  [class]="customClass"
>
  <!-- HEADER -->
  <div *ngIf="title || subtitle" class="flex items-center justify-between mb-6" [class.px-6]="noPadding" [class.pt-6]="noPadding">
    <div>
      <h3 *ngIf="title" class="text-lg font-bold text-text-primary">{{ title }}</h3>
      <p *ngIf="subtitle" class="text-sm text-text-muted mt-1">{{ subtitle }}</p>
    </div>
    <div class="card-actions">
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>

  <!-- CONTENT -->
  <div [class.px-6]="noPadding" [class.pb-6]="noPadding">
    <ng-content></ng-content>
  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <ng-content select="[footer]"></ng-content>
  </div>
</div>
