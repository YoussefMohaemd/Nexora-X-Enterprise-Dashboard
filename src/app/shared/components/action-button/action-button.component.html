<p-button
  [severity]="severity"
  [outlined]="isOutlined"
  [text]="isText"
  [loading]="loading"
  [disabled]="disabled"
  [icon]="icon"
  [label]="label"
  [size]="pSize"
  [type]="type"
  (onClick)="clicked.emit($event)"
  [styleClass]="'btn-' + variant + (customClass ? ' ' + customClass : '')">
  <ng-content></ng-content>
</p-button>
