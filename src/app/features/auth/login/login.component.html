 <div class="p-8">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-white mb-2">Welcome Back</h2>
        <p class="text-muted text-sm">Please enter your details to sign in.</p>
      </div>

      <form (submit)="handleLogin()" class="space-y-6">
        <div class="space-y-2">
          <label class="text-xs font-semibold text-muted uppercase tracking-wider ml-1">Email Address</label>
          <div class="relative">
            <i class="pi pi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-muted"></i>
            <input type="email" name="email" [(ngModel)]="email" required
                   class="input pl-12" placeholder="name@company.com">
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between ml-1">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider">Password</label>
            <a routerLink="/auth/forgot-password" class="text-xs text-primary hover:underline transition-all">Forgot password?</a>
          </div>
          <div class="relative">
            <i class="pi pi-lock absolute left-4 top-1/2 -translate-y-1/2 text-muted"></i>
            <input [type]="showPassword() ? 'text' : 'password'" name="password" [(ngModel)]="password" required
                   class="input pl-12 pr-12" placeholder="••••••••">
            <button type="button" (click)="togglePassword()" 
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-white transition-colors">
              <i [class]="'pi ' + (showPassword() ? 'pi-eye-slash' : 'pi-eye')"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center gap-3 ml-1">
          <input type="checkbox" id="remember" class="w-4 h-4 rounded border-white/10 bg-white/5 accent-primary">
          <label for="remember" class="text-sm text-muted cursor-pointer">Remember for 30 days</label>
        </div>

        <app-action-button type="submit" [loading]="isLoading()" label="Sign In" customClass="w-full py-4 text-base shadow-lg shadow-primary/20"></app-action-button>

        <div class="relative py-4">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
          <div class="relative flex justify-center text-xs uppercase"><span class="bg-card px-2 text-muted">Or continue with</span></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button type="button" class="flex items-center justify-center gap-3 py-3 rounded-xl border border-white/10 hover:bg-white/5 transition-all">
            <i class="pi pi-google"></i>
            <span class="text-sm font-medium">Google</span>
          </button>
          <button type="button" class="flex items-center justify-center gap-3 py-3 rounded-xl border border-white/10 hover:bg-white/5 transition-all">
            <i class="pi pi-github"></i>
            <span class="text-sm font-medium">GitHub</span>
          </button>
        </div>
      </form>

      <div class="mt-8 text-center text-sm">
        <span class="text-muted">Don't have an account? </span>
        <a routerLink="/auth/register" class="text-primary font-bold hover:underline">Sign up for free</a>
      </div>
    </div>
