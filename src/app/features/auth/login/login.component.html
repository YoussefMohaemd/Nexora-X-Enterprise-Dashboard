<div class="p-8 md:p-10">
  <div class="mb-10">
    <h2 class="text-3xl font-bold text-text mb-2 tracking-tight">Welcome Back</h2>
    <p class="text-muted text-sm font-medium">
      Please enter your details to sign in to your workspace.
    </p>
  </div>

  <form (submit)="handleLogin()" class="space-y-5">
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-muted uppercase tracking-[0.15em] ml-1">
        Email Address
      </label>

      <app-ui-input
        type="email"
        name="email"
        [value]="email"
        [required]="true"
        autocomplete="email"
        icon="pi pi-envelope"
        placeholder="name@company.com"
        ariaLabel="Email address"
        (valueChange)="email = $event">
      </app-ui-input>
    </div>

    <div class="space-y-1.5">
      <div class="flex items-center justify-between ml-1">
        <label class="text-[11px] font-bold text-muted uppercase tracking-[0.15em]">Password</label>
        <a
          routerLink="/auth/forgot-password"
          class="text-[11px] font-bold text-primary hover:text-primary/80 transition-all uppercase tracking-wider"
          >Forgot?</a
        >
      </div>

      <app-ui-input
        [type]="showPassword() ? 'text' : 'password'"
        name="password"
        [value]="password"
        [required]="true"
        autocomplete="current-password"
        icon="pi pi-lock"
        [endIcon]="'pi ' + (showPassword() ? 'pi-eye-slash' : 'pi-eye')"
        placeholder="••••••••"
        ariaLabel="Password"
        (valueChange)="password = $event"
        (endIconClick)="togglePassword()">
      </app-ui-input>
    </div>

    <div class="flex items-center gap-3 ml-1 pt-1">
      <input
        type="checkbox"
        id="remember"
        class="w-4 h-4 rounded border-white/10 bg-surface accent-primary cursor-pointer transition-all"
      />
      <label
        for="remember"
        class="text-xs font-semibold text-muted cursor-pointer hover:text-text transition-colors"
        >Remember for 30 days</label
      >
    </div>

    <app-action-button
      type="submit"
      [disabled]="isLoading()"
      [loading]="isLoading()"
      [label]="isLoading() ? 'Signing In...' : 'Sign In'"
      customClass="w-full py-3.5 text-sm font-bold shadow-xl shadow-primary/10 hover:shadow-primary/20 mt-2">
    </app-action-button>
  </form>

  <div class="mt-10 pt-6 border-t border-white/5 text-center text-sm">
    <span class="text-muted font-medium"> New to NexoraX? </span>
    <a routerLink="/auth/register" class="text-primary font-bold hover:underline ml-1"
      >Create an account</a
    >
  </div>
</div>
