<div class="p-8">
  <div class="mb-8 text-center">
    <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/10">
      <i class="pi pi-key text-primary"></i>
    </div>
    <h2 class="text-2xl font-bold text-white mb-2">Forgot Password?</h2>
    <p class="text-muted text-sm">No worries, we'll send you reset instructions.</p>
  </div>

  <form *ngIf="!emailSent()" class="space-y-6">
    <div class="space-y-2">
      <label class="text-xs font-semibold text-muted uppercase tracking-wider ml-1">Email Address</label>
      <app-ui-input
        type="email"
        [value]="email"
        autocomplete="email"
        icon="pi pi-envelope"
        placeholder="john@company.com"
        ariaLabel="Email address"
        (valueChange)="email = $event">
      </app-ui-input>
    </div>

    <app-action-button (clicked)="sendResetLink()" [loading]="isLoading()" label="Reset Password" customClass="w-full py-4 text-base shadow-lg shadow-primary/20"></app-action-button>
  </form>

  <div *ngIf="emailSent()" class="text-center py-4 animate-fade-in">
    <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 mb-6 font-medium text-emerald-500 text-sm italic leading-relaxed">
      We've sent a password reset link to your email. Please check your inbox.
    </div>
    <app-action-button variant="outline" label="Open Email App" customClass="w-full py-3"></app-action-button>
  </div>

  <div class="mt-8 text-center text-sm">
    <a routerLink="/auth/login" class="text-muted hover:text-white transition-colors flex items-center justify-center gap-2">
      <i class="pi pi-arrow-left text-[10px]"></i>
      Back to login
    </a>
  </div>
</div>
