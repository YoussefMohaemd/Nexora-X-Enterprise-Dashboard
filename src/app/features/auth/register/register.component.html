<div class="p-8 md:p-10">
  <div class="mb-10">
    <h2 class="text-3xl font-bold text-text mb-2 tracking-tight">Create Account</h2>
    <p class="text-muted text-sm font-medium">Join NexoraX and start managing your SaaS today.</p>
  </div>

  <form class="space-y-5">
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label class="text-[11px] font-bold text-muted uppercase tracking-[0.15em] ml-1"
          >First Name</label
        >
        <app-ui-input type="text" placeholder="John" ariaLabel="First name"></app-ui-input>
      </div>
      <div class="space-y-1.5">
        <label class="text-[11px] font-bold text-muted uppercase tracking-[0.15em] ml-1"
          >Last Name</label
        >
        <app-ui-input type="text" placeholder="Doe" ariaLabel="Last name"></app-ui-input>
      </div>
    </div>

    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-muted uppercase tracking-[0.15em] ml-1"
        >Email Address</label
      >
      <app-ui-input
        type="email"
        autocomplete="email"
        icon="pi pi-envelope"
        placeholder="john@company.com"
        ariaLabel="Email address">
      </app-ui-input>
    </div>

    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-muted uppercase tracking-[0.15em] ml-1"
        >Password</label
      >
      <app-ui-input
        type="password"
        autocomplete="new-password"
        icon="pi pi-lock"
        placeholder="••••••••"
        ariaLabel="Password">
      </app-ui-input>
      <p class="text-[11px] text-muted/60 ml-1 italic font-medium">
        Must be at least 8 characters with numbers.
      </p>
    </div>

    <div class="flex items-start gap-3 ml-1 py-1">
      <input
        type="checkbox"
        id="terms"
        class="w-4 h-4 rounded border-white/10 bg-surface accent-primary cursor-pointer transition-all mt-0.5"
      />
      <label for="terms" class="text-xs text-muted leading-relaxed font-medium">
        I agree to the <a href="#" class="text-primary font-bold hover:underline">Terms</a> and
        <a href="#" class="text-primary font-bold hover:underline">Privacy Policy</a>.
      </label>
    </div>

    <app-action-button
      type="submit"
      label="Create Account"
      customClass="w-full py-4 text-sm font-bold shadow-xl shadow-primary/10 hover:shadow-primary/20 mt-2">
    </app-action-button>
  </form>

  <div class="mt-10 pt-6 border-t border-white/5 text-center text-sm">
    <span class="text-muted font-medium">Already have an account? </span>
    <a routerLink="/auth/login" class="text-primary font-bold hover:underline ml-1">Sign in</a>
  </div>
</div>
