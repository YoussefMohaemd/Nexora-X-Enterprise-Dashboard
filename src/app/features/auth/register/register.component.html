  <div class="p-8">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-white mb-2">Create Account</h2>
        <p class="text-muted text-sm">Join NexoraX and start managing your SaaS today.</p>
      </div>

      <form class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider ml-1">First Name</label>
            <input type="text" class="input" placeholder="John">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider ml-1">Last Name</label>
            <input type="text" class="input" placeholder="Doe">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-semibold text-muted uppercase tracking-wider ml-1">Email Address</label>
          <input type="email" class="input" placeholder="john@company.com">
        </div>

        <div class="space-y-2">
          <label class="text-xs font-semibold text-muted uppercase tracking-wider ml-1">Password</label>
          <input type="password" class="input" placeholder="••••••••">
          <p class="text-[10px] text-muted ml-1 italic">Must be at least 8 characters long.</p>
        </div>

        <div class="flex items-start gap-3 ml-1 py-2">
          <input type="checkbox" id="terms" class="mt-1 w-4 h-4 rounded border-white/10 bg-white/5 accent-primary">
          <label for="terms" class="text-xs text-muted leading-relaxed">
            I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and 
            <a href="#" class="text-primary hover:underline">Privacy Policy</a>.
          </label>
        </div>

        <app-action-button label="Create Account" customClass="w-full py-4 text-base shadow-lg shadow-primary/20"></app-action-button>
      </form>

      <div class="mt-8 text-center text-sm">
        <span class="text-muted">Already have an account? </span>
        <a routerLink="/auth/login" class="text-primary font-bold hover:underline">Sign in</a>
      </div>
    </div>
