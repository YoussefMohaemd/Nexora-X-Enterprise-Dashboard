 <app-page-header title="Analytics" description="In-depth analysis of your platform's usage, performance, and trends.">
       <div actions class="flex gap-2">
         <div class="flex p-1 bg-white/5 rounded-xl border border-white/10">
            <button class="px-4 py-1.5 rounded-lg bg-primary text-bg text-xs font-bold transition-all">Real-time</button>
            <button class="px-4 py-1.5 rounded-lg text-muted hover:text-white text-xs font-medium transition-all">Historical</button>
         </div>
         <app-action-button icon="pi pi-download" label="Export Data"></app-action-button>
       </div>
    </app-page-header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
       <app-stat-card label="Page Views" value="2.4M" icon="pi-eye" iconBgClass="bg-blue-500" iconColorClass="text-blue-500" trend="+12%" [trendPositive]="true"></app-stat-card>
       <app-stat-card label="Avg. Session" value="4m 32s" icon="pi-clock" iconBgClass="bg-purple-500" iconColorClass="text-purple-500" trend="+5.4%" [trendPositive]="true"></app-stat-card>
       <app-stat-card label="Bounce Rate" value="32.1%" icon="pi-undo" iconBgClass="bg-rose-500" iconColorClass="text-rose-500" trend="-2.1%" [trendPositive]="true"></app-stat-card>
       <app-stat-card label="Conversions" value="12.4k" icon="pi-check-circle" iconBgClass="bg-emerald-500" iconColorClass="text-emerald-500" trend="+8.2%" [trendPositive]="true"></app-stat-card>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
       <app-ui-card>
          <div class="flex items-center justify-between mb-8">
             <h3 class="text-lg font-bold dark:text-white">Traffic Sources</h3>
             <i class="pi pi-filter text-muted cursor-pointer hover:text-white transition-colors"></i>
          </div>
          
          <div class="space-y-6">
             <div *ngFor="let source of trafficSources" class="space-y-2">
                <div class="flex items-center justify-between text-sm">
                   <div class="flex items-center gap-2">
                      <i [class]="'pi ' + source.icon + ' text-xs'" [style.color]="source.color"></i>
                      <span class="dark:text-white font-medium">{{ source.name }}</span>
                   </div>
                   <span class="text-muted">{{ source.value }}%</span>
                </div>
                <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                   <div class="h-full rounded-full" [style.width.%]="source.value" [style.background-color]="source.color"></div>
                </div>
             </div>
          </div>
       </app-ui-card>

       <app-ui-card>
          <div class="flex items-center justify-between mb-8">
             <h3 class="text-lg font-bold dark:text-white">Geographic Reach</h3>
             <app-action-button variant="ghost" label="World Map"></app-action-button>
          </div>

          <div class="space-y-5">
             <div *ngFor="let country of topCountries" class="flex items-center justify-between p-3 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/5 transition-all">
                <div class="flex items-center gap-4">
                   <span class="text-2xl">{{ country.flag }}</span>
                   <div>
                      <h4 class="text-sm font-semibold dark:text-white">{{ country.name }}</h4>
                      <p class="text-[10px] text-muted uppercase tracking-widest">{{ country.visitors }} Visitors</p>
                   </div>
                </div>
                <div class="text-right">
                   <p class="text-sm font-bold text-primary">{{ country.percentage }}%</p>
                   <div class="flex items-center gap-1">
                      <i class="pi pi-arrow-up text-emerald-500 text-[8px]"></i>
                      <span class="text-[10px] text-emerald-500">{{ country.trend }}%</span>
                   </div>
                </div>
             </div>
          </div>
       </app-ui-card>
    </div>
