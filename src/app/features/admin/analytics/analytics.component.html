<app-page-header
  title="Analytics"
  description="In-depth analysis of your platform's usage, performance, and trends."
>
  <div actions class="flex items-center gap-4">
    <app-segmented-control
      [options]="viewOptions"
      [selectedValue]="analyticsView()"
      (selectionChange)="analyticsView.set($event)"
    ></app-segmented-control>

    <app-action-button
      variant="outline"
      icon="pi pi-download"
      label="Export Data"
      customClass="rounded-xl"
    ></app-action-button>
  </div>
</app-page-header>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
  <app-stat-card
    label="Page Views"
    value="2.4M"
    icon="pi-eye"
    iconBgClass="bg-blue-500"
    iconColorClass="text-blue-500"
    trend="+12%"
    [trendPositive]="true"
  ></app-stat-card>
  <app-stat-card
    label="Avg. Session"
    value="4m 32s"
    icon="pi-clock"
    iconBgClass="bg-purple-500"
    iconColorClass="text-purple-500"
    trend="+5.4%"
    [trendPositive]="true"
  ></app-stat-card>
  <app-stat-card
    label="Bounce Rate"
    value="32.1%"
    icon="pi-undo"
    iconBgClass="bg-rose-500"
    iconColorClass="text-rose-500"
    trend="-2.1%"
    [trendPositive]="true"
  ></app-stat-card>
  <app-stat-card
    label="Conversions"
    value="12.4k"
    icon="pi-check-circle"
    iconBgClass="bg-emerald-500"
    iconColorClass="text-emerald-500"
    trend="+8.2%"
    [trendPositive]="true"
  ></app-stat-card>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
  <app-ui-card customClass="p-0 overflow-hidden h-full shadow-premium">
    <div class="p-6 border-b border-border flex items-center justify-between">
      <h3 class="text-xl font-black text-text-primary">Traffic Sources</h3>
      <i class="pi pi-chart-bar text-text-muted"></i>
    </div>

    <div class="p-6 space-y-8">
      <div *ngFor="let source of trafficSources" class="group">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300 group-hover:scale-110"
              [style.background-color]="source.color + '1a'"
            >
              <i [class]="source.icon + ' text-sm'" [style.color]="source.color"></i>
            </div>
            <div>
              <span class="text-sm font-bold text-text-primary block">{{ source.name }}</span>
              <span class="text-[10px] text-text-muted uppercase tracking-wider font-bold"
                >Channel Source</span
              >
            </div>
          </div>
          <div class="text-right">
            <span class="text-base font-black text-text-primary">{{ source.value }}%</span>
          </div>
        </div>

        <app-ui-progress-bar
          [value]="source.value"
          [color]="source.color"
          [height]="8"
          [showGlow]="true"
        ></app-ui-progress-bar>
      </div>
    </div>
  </app-ui-card>

  <app-ui-card customClass="p-0 overflow-hidden h-full shadow-premium">
    <div class="p-6 border-b border-border flex items-center justify-between">
      <h3 class="text-xl font-black text-text-primary">Geographic Reach</h3>
      <app-action-button variant="ghost" label="World Map" icon="pi pi-map"></app-action-button>
    </div>

    <div class="p-4 space-y-2">
      <div
        *ngFor="let country of topCountries"
        class="flex items-center justify-between p-4 rounded-2xl hover:bg-surface-50 border border-transparent hover:border-border transition-all group"
      >
        <div class="flex items-center gap-4">
          <span class="text-3xl filter drop-shadow-sm group-hover:scale-110 transition-transform">{{
            country.flag
          }}</span>
          <div>
            <h4 class="text-sm font-bold text-text-primary">{{ country.name }}</h4>
            <p class="text-[10px] text-text-muted uppercase tracking-[0.15em] font-bold">
              {{ country.visitors }} Visitors
            </p>
          </div>
        </div>
        <div class="text-right">
          <p class="text-base font-black text-primary">{{ country.percentage }}%</p>
          <div class="flex items-center gap-1.5 justify-end">
            <div
              class="flex items-center gap-1 px-1.5 py-0.5 rounded bg-emerald-500/10 border border-emerald-500/20"
            >
              <i class="pi pi-arrow-up text-emerald-500 text-[8px]"></i>
              <span class="text-[10px] font-black text-emerald-500">{{ country.trend }}%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </app-ui-card>
</div>
