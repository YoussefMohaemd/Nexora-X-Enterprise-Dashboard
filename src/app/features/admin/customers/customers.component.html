<!-- ================= PAGE HEADER ================= -->
<app-page-header
  title="Customers"
  description="Manage your customer database and track user activity."
>
  <div actions class="flex gap-3">
    <app-action-button
      icon="pi pi-download"
      variant="outline"
      label="Export"
      (clicked)="exportCSV()"
      customClass="rounded-xl"
    ></app-action-button>

    <app-action-button
      icon="pi pi-plus"
      label="Add Customer"
      customClass="rounded-xl shadow-md hover:shadow-xl"
    ></app-action-button>
  </div>
</app-page-header>

<!-- ================= SEARCH + FILTER ================= -->
<app-ui-card customClass="mb-6">

  <div class="flex flex-col md:flex-row gap-4 items-center justify-between">

    <!-- SEARCH -->
    <div class="search-box w-full md:w-[380px]">
      <i class="pi pi-search"></i>

      <input
        type="text"
        pInputText
        [(ngModel)]="searchTerm"
        placeholder="Search customers..."
      />
    </div>

    <!-- FILTERS -->
    <div class="flex items-center gap-2 flex-wrap">

      <p-tag value="Active" severity="success" class="cursor-pointer"></p-tag>
      <p-tag value="Inactive" severity="danger" class="cursor-pointer"></p-tag>
      <p-tag value="Admin" severity="contrast" class="dark:text-black cursor-pointer"></p-tag>

      <app-action-button
        icon="pi pi-filter"
        label="Filters"
        variant="ghost"
        customClass="rounded-xl hover:bg-primary/10"
      ></app-action-button>

    </div>

  </div>

</app-ui-card>

<!-- ================= TABLE ================= -->
<app-ui-card customClass="table-card">

  <p-table
    [value]="filteredUsers()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 20, 50]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} - {last} of {totalRecords}"
  >

    <!-- HEADER -->
    <ng-template pTemplate="header">
      <tr>
        <th></th>
        <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Department</th>
        <th>Last Login</th>
        <th class="text-right">Actions</th>
      </tr>
    </ng-template>

    <!-- BODY -->
    <ng-template pTemplate="body" let-user>
      <tr class="group">

        <!-- AVATAR -->
        <td>
          <img [src]="user.avatar" class="avatar" />
        </td>

        <!-- NAME -->
        <td class="font-bold text-text-primary group-hover:text-primary transition-colors">
          {{ user.name }}
        </td>

        <!-- EMAIL -->
        <td class="text-text-muted text-sm">
          {{ user.email }}
        </td>

        <!-- ROLE -->
        <td>
          <p-tag
            [value]="user.role"
            [severity]="user.role === 'admin' ? 'contrast' : 'info'"
          ></p-tag>
        </td>

        <!-- STATUS -->
        <td>
          <p-tag
            [value]="user.status"
            [severity]="getSeverity(user.status)"
          ></p-tag>
        </td>

        <!-- DEPARTMENT -->
        <td class="text-text-muted text-sm">
          {{ user.metadata?.department || 'N/A' }}
        </td>

        <!-- LAST LOGIN -->
        <td class="text-[10px] font-bold text-text-muted uppercase tracking-wider">
          {{ user.lastLogin | date:'mediumDate' }}
        </td>

        <!-- ACTIONS -->
        <td class="text-right">
          <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition">

            <app-action-button
              icon="pi pi-eye"
              variant="ghost"
              customClass="!p-2"
            ></app-action-button>

            <app-action-button
              icon="pi pi-pencil"
              variant="ghost"
              customClass="!p-2"
            ></app-action-button>

            <app-action-button
              icon="pi pi-trash"
              variant="ghost"
              customClass="!p-2 text-red-500"
            ></app-action-button>

          </div>
        </td>

      </tr>
    </ng-template>

    <!-- EMPTY -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="8">
          <div class="empty-state">

            <i class="pi pi-users"></i>

            <h3>No customers found</h3>

            <p>Try adjusting your search or filters</p>

            <app-action-button
              label="Clear filters"
              variant="secondary"
              (clicked)="searchTerm.set('')"
            ></app-action-button>

          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>

</app-ui-card>
