<app-page-header title="Customers" description="Manage your customer database and track user activity.">
  <div actions class="flex gap-2">
    <app-action-button icon="pi pi-download" variant="outline" label="Export" (clicked)="exportCSV()"></app-action-button>
    <app-action-button icon="pi pi-plus" label="Add Customer"></app-action-button>
  </div>
</app-page-header>

<app-ui-card customClass="mb-8">
  <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
    <div class="relative w-full max-w-md">
      <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-muted"></i>
      <input type="text" pInputText [(ngModel)]="searchTerm" 
             placeholder="Search by name, email or department..." 
             class="input pl-12 w-full">
    </div>
    
    <div class="flex items-center gap-2">
      <span class="text-xs font-semibold text-muted uppercase tracking-wider mr-2">Filters:</span>
      <p-tag value="Active" severity="success" class="cursor-pointer"></p-tag>
      <p-tag value="Admin" severity="contrast" class="cursor-pointer"></p-tag>
      <app-action-button icon="pi pi-filter" variant="ghost" label="Advanced"></app-action-button>
    </div>
  </div>
</app-ui-card>

<app-ui-card customClass="p-0 overflow-hidden">
  <p-table 
    [value]="filteredUsers()" 
    [paginator]="true" 
    [rows]="10" 
    [showCurrentPageReport]="true"
    [responsiveLayout]="'scroll'"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [rowsPerPageOptions]="[10, 25, 50]"
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr class="!bg-surface/50">
        <th style="width: 60px"></th>
        <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
        <th>Role</th>
        <th>Status</th>
        <th pSortableColumn="metadata.department">Department <p-sortIcon field="metadata.department"></p-sortIcon></th>
        <th pSortableColumn="lastLogin">Activity <p-sortIcon field="lastLogin"></p-sortIcon></th>
        <th style="width: 100px text-right">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr class="hover:bg-primary/[0.02] border-b border-border transition-colors">
        <td>
          <div class="w-10 h-10 rounded-xl overflow-hidden border border-border shadow-lg">
            <img [src]="user.avatar" class="w-full h-full object-cover">
          </div>
        </td>
        <td>
          <span class="font-bold text-text">{{ user.name }}</span>
        </td>
        <td>
          <span class="text-muted text-sm font-mono">{{ user.email }}</span>
        </td>
        <td>
          <p-tag [value]="user.role" [severity]="user.role === 'admin' ? 'contrast' : 'info'"></p-tag>
        </td>
        <td>
          <p-tag [value]="user.status" [severity]="getSeverity(user.status)"></p-tag>
        </td>
        <td>
          <span class="text-sm text-muted italic">{{ user.metadata?.department || 'N/A' }}</span>
        </td>
        <td>
          <span class="text-xs text-muted">{{ user.lastLogin | date:'mediumDate' }}</span>
        </td>
        <td>
          <div class="flex justify-end gap-1">
            <app-action-button icon="pi pi-eye" variant="ghost" customClass="!p-2"></app-action-button>
            <app-action-button icon="pi pi-pencil" variant="ghost" customClass="!p-2"></app-action-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="8" class="p-20 text-center">
          <div class="flex flex-col items-center gap-4">
            <div class="w-20 h-20 bg-surface rounded-full flex items-center justify-center mb-6">
              <i class="pi pi-users text-4xl text-muted/20"></i>
            </div>
            <h3 class="text-xl font-black text-text">No customers found</h3>
            <p class="text-muted max-w-xs mx-auto font-medium">Try adjusting your search or filters to find what you're looking for.</p>
            <app-action-button label="Clear all filters" variant="outline" (clicked)="searchTerm.set('')"></app-action-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</app-ui-card>
