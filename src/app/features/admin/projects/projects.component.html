<app-page-header title="Projects" description="Manage your team projects and tasks.">
  <div actions class="flex gap-2">
    <app-action-button icon="pi pi-plus" label="New Project"></app-action-button>
  </div>
</app-page-header>

<app-ui-card>
  <p-table [value]="projects" [paginator]="true" [rows]="10">
    <ng-template pTemplate="header">
      <tr>
        <th>Project</th>
        <th>Team</th>
        <th>Progress</th>
        <th>Deadline</th>
        <th>Status</th>
        <th style="width: 120px"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-project>
      <tr class="hover:bg-primary/[0.02] border-b border-border transition-colors">
        <td>
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-primary to-secondary flex items-center justify-center">
              <i class="pi pi-folder text-white text-sm"></i>
            </div>
            <div>
              <div class="font-bold text-text">{{ project.name }}</div>
              <div class="text-[11px] font-medium text-muted">{{ project.description }}</div>
            </div>
          </div>
        </td>
        <td>{{ project.team.length }} members</td>
        <td>
          <div class="w-24 h-2 bg-surface rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-emerald-400 to-blue-400" [style.width.%]="project.progress"></div>
          </div>
          <div class="text-[11px] font-bold text-muted mt-1.5">{{ project.progress }}%</div>
        </td>
        <td>{{ project.deadline | date:'short' }}</td>
        <td>
          <p-tag [value]="project.status" [severity]="project.status === 'Active' ? 'success' : 'info'"></p-tag>
        </td>
        <td>
          <div class="flex gap-1">
            <app-action-button icon="pi pi-eye" variant="ghost"></app-action-button>
            <app-action-button icon="pi pi-pencil" variant="ghost"></app-action-button>
            <app-action-button icon="pi pi-ellipsis-v" variant="ghost"></app-action-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</app-ui-card>
