 <app-page-header title="Inventory" description="Track and manage your products, stock levels, and pricing.">
      <div actions class="flex gap-2">
        <app-action-button icon="pi pi-plus" label="New Product"></app-action-button>
      </div>
    </app-page-header>

    <app-ui-card customClass="mb-8">
      <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
        <div class="relative w-full max-w-md">
          <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-muted"></i>
          <input type="text" pInputText [(ngModel)]="searchTerm" 
                 placeholder="Search products..." 
                 class="input pl-12 w-full">
        </div>
        
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold text-muted uppercase tracking-wider mr-2">Category:</span>
severity="info"
          <p-tag value="Templates" severity="secondary" class="cursor-pointer"></p-tag>
          <p-tag value="Components" severity="secondary" class="cursor-pointer"></p-tag>
        </div>
      </div>
    </app-ui-card>

    <app-ui-card customClass="p-0 overflow-hidden">
      <p-table 
        [value]="filteredProducts()" 
        [paginator]="true" 
        [rows]="10" 
        [responsiveLayout]="'scroll'"
        styleClass="p-datatable-sm"
      >
        <ng-template pTemplate="header">
          <tr class="!bg-white/5">
            <th style="width: 80px"></th>
            <th pSortableColumn="name">Product Name <p-sortIcon field="name"></p-sortIcon></th>
            <th pSortableColumn="category">Category <p-sortIcon field="category"></p-sortIcon></th>
            <th pSortableColumn="price">Price <p-sortIcon field="price"></p-sortIcon></th>
            <th pSortableColumn="stock">Stock <p-sortIcon field="stock"></p-sortIcon></th>
            <th>Status</th>
            <th style="width: 100px" class="text-right">Actions</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-product>
          <tr class="hover:bg-white/[0.02] border-b border-white/5 transition-colors">
            <td>
              <div class="w-12 h-12 rounded-lg overflow-hidden border border-white/10 shadow-sm">
                <img [src]="product.image" class="w-full h-full object-cover">
              </div>
            </td>
            <td>
              <span class="font-semibold text-white">{{ product.name }}</span>
            </td>
            <td>
              <span class="text-muted text-sm">{{ product.category }}</span>
            </td>
            <td>
              <span class="font-bold text-primary">{{ product.price | currency:'USD' }}</span>
            </td>
            <td>
              <div class="flex items-center gap-2">
                <div class="w-24 h-1.5 bg-white/5 rounded-full overflow-hidden">
                  <div [class]="getStockColor(product.stock)" 
                       [style.width.%]="product.stock > 100 ? 100 : product.stock"></div>
                </div>
                <span class="text-xs text-muted font-mono">{{ product.stock }}</span>
              </div>
            </td>
            <td>
              <p-tag [value]="product.status.replace('_', ' ')" [severity]="getStatusSeverity(product.status)"></p-tag>
            </td>
            <td>
              <div class="flex justify-end gap-1">
                <app-action-button icon="pi pi-pencil" variant="ghost" customClass="!p-2"></app-action-button>
                <app-action-button icon="pi pi-trash" variant="ghost" customClass="!p-2 text-rose-500 hover:!text-rose-400"></app-action-button>
              </div>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="7" class="p-20 text-center">
              <i class="pi pi-box text-4xl text-muted/30 mb-4 block"></i>
              <h3 class="text-xl font-bold text-white">No products found</h3>
              <p class="text-muted mt-2">Adjust your search terms and try again.</p>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </app-ui-card>
