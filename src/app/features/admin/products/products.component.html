<app-page-header
  title="Inventory"
  description="Track and manage your products, stock levels, and pricing."
>
  <div actions class="flex gap-2">
    <app-action-button
      (clicked)="isModalOpen.set(true)"
      icon="pi pi-plus"
      label="New Product"
      customClass="rounded-xl shadow-md hover:shadow-xl"
    ></app-action-button>
  </div>
</app-page-header>

<!-- ================= ADD PRODUCT MODAL ================= -->
<p-dialog
  [(visible)]="isModalOpen"
  [modal]="true"
  [header]="'Add New Product'"
  [draggable]="false"
  [resizable]="false"
  styleClass="custom-dialog"
  [breakpoints]="{ '960px': '75vw', '641px': '90vw' }"
  [style]="{ width: '500px' }"
>
  <form class="flex flex-col gap-5 pt-4">
    <div class="space-y-6">
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Product Name</label>
        <app-ui-input placeholder="e.g. Premium Dashboard Template" icon="pi pi-tag"></app-ui-input>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Category</label>
        <app-ui-input placeholder="e.g. Components" icon="pi pi-folder"></app-ui-input>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Price (USD)</label>
          <app-ui-input placeholder="0.00" icon="pi pi-dollar"></app-ui-input>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Stock Level</label>
          <app-ui-input placeholder="0" icon="pi pi-box"></app-ui-input>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <app-action-button
        label="Cancel"
        variant="ghost"
        (clicked)="isModalOpen.set(false)"
      ></app-action-button>
      <app-action-button
        label="Create Product"
        variant="primary"
        (clicked)="isModalOpen.set(false)"
      ></app-action-button>
    </div>
  </form>
</p-dialog>

<app-ui-card customClass="mb-8">
  <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
    <div class="search-box">
      <app-ui-input
        icon="pi pi-search"
        [value]="searchTerm()"
        placeholder="Search products..."
        ariaLabel="Search products"
        (valueChange)="searchTerm.set($event)"
      ></app-ui-input>
    </div>

    <div class="flex items-center gap-2">
      <span class="text-xs font-semibold text-text-muted uppercase tracking-wider mr-2">
        Category:
      </span>

      <p-tag value="Templates" severity="info" class="cursor-pointer"></p-tag>
      <p-tag value="Components" severity="secondary" class="cursor-pointer"></p-tag>
    </div>
  </div>
</app-ui-card>

<app-ui-card customClass="p-0 overflow-hidden shadow-premium">
  <p-table
    [value]="filteredProducts()"
    [paginator]="true"
    [rows]="10"
    [responsiveLayout]="'scroll'"
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 80px"></th>
        <th pSortableColumn="name">Product Name <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="category">Category <p-sortIcon field="category"></p-sortIcon></th>
        <th pSortableColumn="price" class="text-right">
          Price <p-sortIcon field="price"></p-sortIcon>
        </th>
        <th pSortableColumn="stock">Stock <p-sortIcon field="stock"></p-sortIcon></th>
        <th>Status</th>
        <th style="width: 100px" class="text-right">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-product>
      <tr class="hover:bg-primary/[0.02] border-b border-border transition-colors group">
        <td>
          <div class="w-12 h-12 rounded-lg overflow-hidden border border-border shadow-sm group-hover:scale-105 transition-transform">
            <img [src]="product.image" class="w-full h-full object-cover" />
          </div>
        </td>
        <td>
          <span class="font-bold text-text-primary group-hover:text-primary transition-colors">{{ product.name }}</span>
        </td>
        <td>
          <span class="text-text-muted text-sm font-medium">{{ product.category }}</span>
        </td>
        <td class="text-right">
          <span class="font-black text-text-primary">{{ product.price | currency: 'USD' }}</span>
        </td>
        <td>
          <div class="flex items-center gap-3">
            <div class="w-24">
              <app-ui-progress-bar 
                [value]="product.stock > 100 ? 100 : product.stock"
                [color]="getStockColor(product.stock)"
                [height]="6"
                [showGlow]="product.stock < 30"
              ></app-ui-progress-bar>
            </div>
            <span class="text-xs text-text-muted font-mono font-bold">{{ product.stock }}</span>
          </div>
        </td>
        <td>
          <p-tag
            [value]="(product.status ?? 'Unknown').replace(/[_-]/g, ' ')"
            [severity]="getStatusSeverity(product.status ?? '')"
          ></p-tag>
        </td>
        <td>
          <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-all duration-300">
            <app-action-button
              icon="pi pi-pencil"
              variant="ghost"
              customClass="!p-2 hover:bg-surface-100"
            ></app-action-button>
            <app-action-button
              icon="pi pi-trash"
              variant="ghost"
              customClass="!p-2 text-rose-500 hover:bg-rose-500/10"
            ></app-action-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="!p-0">
          <app-ui-empty-state
            icon="pi-box"
            title="No products found"
            description="We couldn't find any products matching your search criteria. Try adjusting your filters."
            actionLabel="Clear filters"
            (actionClicked)="searchTerm.set('')"
          ></app-ui-empty-state>
        </td>
      </tr>
    </ng-template>
  </p-table>
</app-ui-card>
