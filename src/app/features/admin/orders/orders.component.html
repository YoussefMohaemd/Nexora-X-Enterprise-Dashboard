<app-page-header
  title="Orders"
  description="Monitor customer transactions, fulfillment status, and history."
>
  <div actions class="flex gap-2">
    <app-action-button icon="pi pi-filter" variant="outline" label="Filter"></app-action-button>
    <app-action-button
      (clicked)="isModalOpen.set(true)"
      icon="pi pi-plus"
      label="Create Order"
      customClass="rounded-xl shadow-md hover:shadow-xl"
    ></app-action-button>
  </div>
</app-page-header>

<!-- ================= CREATE ORDER MODAL ================= -->
<p-dialog
  [(visible)]="isModalOpen"
  [modal]="true"
  [header]="'Create New Order'"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  styleClass="custom-dialog"
  [breakpoints]="{ '960px': '75vw', '641px': '90vw' }"
  [style]="{ width: '500px' }"
>
  <form class="flex flex-col gap-5 pt-4">
    <div class="space-y-6">
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Customer Name</label>
        <app-ui-input placeholder="e.g. Sarah Connor" icon="pi pi-user"></app-ui-input>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Product Selection</label>
        <app-ui-input placeholder="Search products..." icon="pi pi-search"></app-ui-input>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Quantity</label>
          <app-ui-input placeholder="1" icon="pi pi-hashtag"></app-ui-input>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-bold text-text-muted uppercase tracking-[0.1em]">Unit Price (USD)</label>
          <app-ui-input placeholder="0.00" icon="pi pi-dollar"></app-ui-input>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <app-action-button
        label="Cancel"
        variant="ghost"
        (clicked)="isModalOpen.set(false)"
      ></app-action-button>
      <app-action-button
        label="Create Order"
        variant="primary"
        (clicked)="isModalOpen.set(false)"
      ></app-action-button>
    </div>
  </form>
</p-dialog>

<app-ui-card [noPadding]="true" customClass="mb-8 overflow-hidden">
  <p-table
    [value]="filteredOrders()"
    [paginator]="true"
    [rows]="10"
    [responsiveLayout]="'scroll'"
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id" style="width: 120px">
          Order ID <p-sortIcon field="id"></p-sortIcon>
        </th>
        <th pSortableColumn="user.name">Customer <p-sortIcon field="user.name"></p-sortIcon></th>
        <th pSortableColumn="product.name">
          Product <p-sortIcon field="product.name"></p-sortIcon>
        </th>
        <th pSortableColumn="total" class="text-right">
          Amount <p-sortIcon field="total"></p-sortIcon>
        </th>
        <th>Status</th>
        <th pSortableColumn="orderDate">Date <p-sortIcon field="orderDate"></p-sortIcon></th>
        <th style="width: 80px" class="text-right">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-order>
      <tr>
        <td>
          <span class="text-xs font-mono font-bold text-primary">#NX_{{ order.id }}</span>
        </td>
        <td>
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg overflow-hidden border border-border shadow-sm">
              <img [src]="order.user.avatar" class="w-full h-full object-cover" />
            </div>
            <span class="font-bold text-text-primary whitespace-nowrap">{{ order.user.name }}</span>
          </div>
        </td>
        <td>
          <span class="text-text-muted text-sm font-medium">{{ order.product.name }}</span>
        </td>
        <td class="text-right">
          <span class="font-bold text-text-primary">{{ order.total | currency: 'USD' }}</span>
        </td>
        <td>
          <p-tag [value]="order.status" [severity]="getStatusSeverity(order.status)"></p-tag>
        </td>
        <td>
          <span class="text-[11px] font-bold text-text-muted uppercase tracking-wider">{{
            order.orderDate | date: 'mediumDate'
          }}</span>
        </td>
        <td class="text-right">
          <div class="flex justify-end gap-1">
            <app-action-button
              icon="pi pi-eye"
              variant="ghost"
              customClass="!p-1.5"
            ></app-action-button>
            <app-action-button
              icon="pi pi-ellipsis-h"
              variant="ghost"
              customClass="!p-1.5"
            ></app-action-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- EMPTY STATE -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7">
          <div class="py-20">
            <app-ui-empty-state
              icon="pi-shopping-cart"
              title="No orders found"
              description="We couldn't find any orders matching your criteria. Try adjusting your search or filters."
              actionLabel="Clear Search"
              (actionClicked)="searchTerm.set('')"
            ></app-ui-empty-state>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</app-ui-card>
