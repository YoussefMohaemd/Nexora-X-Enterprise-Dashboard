  <app-page-header title="Orders" description="Monitor customer transactions, fulfillment status, and history.">
      <div actions class="flex gap-2">
        <app-action-button icon="pi pi-filter" variant="outline" label="Filter"></app-action-button>
        <app-action-button icon="pi pi-plus" label="Create Order"></app-action-button>
      </div>
    </app-page-header>

    <app-ui-card customClass="mb-8 p-0 overflow-hidden">
      <p-table 
        [value]="filteredOrders()" 
        [paginator]="true" 
        [rows]="10" 
        [responsiveLayout]="'scroll'"
        styleClass="p-datatable-sm"
      >
        <ng-template pTemplate="header">
          <tr class="!bg-white/5">
            <th pSortableColumn="id" style="width: 100px text-right">Order ID <p-sortIcon field="id"></p-sortIcon></th>
            <th pSortableColumn="user.name">Customer <p-sortIcon field="user.name"></p-sortIcon></th>
            <th pSortableColumn="product.name">Product <p-sortIcon field="product.name"></p-sortIcon></th>
            <th pSortableColumn="total">Amount <p-sortIcon field="total"></p-sortIcon></th>
            <th>Status</th>
            <th pSortableColumn="orderDate">Date <p-sortIcon field="orderDate"></p-sortIcon></th>
            <th style="width: 80px"></th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-order>
          <tr class="hover:bg-white/[0.02] border-b border-white/5 transition-colors">
            <td>
              <span class="text-xs font-mono text-muted">#NX_{{ order.id }}</span>
            </td>
            <td>
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg overflow-hidden border border-white/10 shadow-sm">
                  <img [src]="order.user.avatar" class="w-full h-full object-cover">
                </div>
                <span class="font-semibold text-white whitespace-nowrap">{{ order.user.name }}</span>
              </div>
            </td>
            <td>
              <span class="text-muted text-sm">{{ order.product.name }}</span>
            </td>
            <td>
              <span class="font-bold text-white">{{ order.total | currency:'USD' }}</span>
            </td>
            <td>
              <p-tag [value]="order.status" [severity]="getStatusSeverity(order.status)"></p-tag>
            </td>
            <td>
              <span class="text-xs text-muted">{{ order.orderDate | date:'medium' }}</span>
            </td>
            <td>
              <button class="p-2 rounded-lg hover:bg-white/5 text-muted transition-colors">
                <i class="pi pi-ellipsis-h"></i>
              </button>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="7" class="p-20 text-center">
              <i class="pi pi-shopping-cart text-4xl text-muted/30 mb-4 block"></i>
              <h3 class="text-xl font-bold text-white">No orders found</h3>
              <p class="text-muted mt-2">Try searching for other criteria.</p>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </app-ui-card>
