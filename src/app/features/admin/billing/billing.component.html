<app-page-header title="Billing" description="Manage your subscription, payment methods, and billing history."></app-page-header>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
  <!-- Current Plan -->
  <app-ui-card customClass="lg:col-span-2 bg-gradient-to-br from-card to-card/50 relative overflow-hidden h-full">
    <div class="relative z-10 h-full flex flex-col">
      <div class="flex items-center justify-between mb-8">
        <div>
          <p class="text-[11px] font-bold text-primary uppercase tracking-[0.2em] mb-2">Current Plan</p>
          <h2 class="text-xl font-black text-text-primary">Enterprise Pro</h2>
        </div>
        <p-tag value="Active" severity="success" class="h-fit"></p-tag>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
        <div class="space-y-1">
          <p class="text-[11px] font-bold text-text-muted uppercase tracking-wider">Price</p>
          <p class="text-sm font-black text-text-primary">$299 / month</p>
        </div>
        <div class="space-y-1">
          <p class="text-[11px] font-bold text-text-muted uppercase tracking-wider">Next Invoice</p>
          <p class="text-sm font-black text-text-primary">May 01, 2024</p>
        </div>
        <div class="space-y-1">
          <p class="text-[11px] font-bold text-text-muted uppercase tracking-wider">Payment Method</p>
          <div class="flex items-center gap-2">
            <i class="pi pi-credit-card text-text-muted text-sm"></i>
            <p class="text-sm font-black text-text-primary">•••• 4242</p>
          </div>
        </div>
      </div>

      <div class="mt-auto space-y-4">
         <div class="flex items-center justify-between text-xs font-bold uppercase tracking-wider mb-2">
            <span class="text-text-muted">Usage (Seats)</span>
            <span class="text-text-primary">12 / 20</span>
         </div>
         
         <app-ui-progress-bar 
            [value]="60" 
            [height]="10"
            [showGlow]="true"
         ></app-ui-progress-bar>

         <div class="flex gap-4 pt-4">
           <app-action-button label="Upgrade Plan" customClass="rounded-xl shadow-md"></app-action-button>
           <app-action-button variant="outline" label="Cancel Subscription" customClass="rounded-xl"></app-action-button>
         </div>
      </div>
    </div>
    <i class="pi pi-shield absolute -right-8 -bottom-8 text-[200px] text-white/[0.02] dark:text-white/[0.01] -rotate-12 pointer-events-none"></i>
  </app-ui-card>

  <!-- Quick Actions -->
  <div class="flex flex-col gap-6">
    <app-ui-card customClass="p-6">
      <h4 class="text-xs font-bold text-text-muted mb-6 uppercase tracking-widest">Quick Actions</h4>
      <div class="space-y-3">
         <button class="w-full flex items-center justify-between p-4 rounded-xl bg-surface-50 border border-border hover:border-primary/50 hover:bg-surface-100 transition-all text-sm group">
           <div class="flex items-center gap-3 text-text-muted group-hover:text-text-primary transition-colors">
             <i class="pi pi-file-pdf text-lg"></i>
             <span class="font-bold">Download Last Invoice</span>
           </div>
           <i class="pi pi-chevron-right text-[11px] text-text-muted group-hover:translate-x-1 transition-transform"></i>
         </button>
         <button class="w-full flex items-center justify-between p-4 rounded-xl bg-surface-50 border border-border hover:border-primary/50 hover:bg-surface-100 transition-all text-sm group">
           <div class="flex items-center gap-3 text-text-muted group-hover:text-text-primary transition-colors">
             <i class="pi pi-credit-card text-lg"></i>
             <span class="font-bold">Update Card</span>
           </div>
           <i class="pi pi-chevron-right text-[11px] text-text-muted group-hover:translate-x-1 transition-transform"></i>
         </button>
      </div>
    </app-ui-card>
  </div>
</div>

<!-- Invoices Table -->
<app-ui-card customClass="p-0 overflow-hidden">
   <div class="flex items-center justify-between p-6 border-b border-border">
     <h3 class="text-xl font-black text-text-primary">Billing History</h3>
     <app-action-button variant="ghost" icon="pi pi-filter" label="Filter" customClass="rounded-lg"></app-action-button>
   </div>

   <div class="overflow-x-auto">
     <table class="w-full text-left">
       <thead>
         <tr class="text-[11px] text-text-muted uppercase tracking-[0.15em] bg-surface-50">
            <th class="px-6 py-4 font-bold border-b border-border">Invoice ID</th>
            <th class="px-6 py-4 font-bold border-b border-border">Amount</th>
            <th class="px-6 py-4 font-bold border-b border-border">Status</th>
            <th class="px-6 py-4 font-bold border-b border-border">Date</th>
            <th class="px-6 py-4 font-bold border-b border-border text-right">Action</th>
         </tr>
       </thead>
       <tbody>
         <tr *ngFor="let i of [1,2,3]" class="border-b border-border hover:bg-primary/[0.02] transition-all group">
           <td class="px-6 py-5 font-mono text-xs text-primary font-bold">#INV_2024_00{{i}}</td>
           <td class="px-6 py-5 font-black text-text-primary">$299.00</td>
           <td class="px-6 py-5">
             <p-tag [value]="'Paid'" severity="success"></p-tag>
           </td>
           <td class="px-6 py-5 text-sm text-text-muted font-medium">April 01, 2024</td>
           <td class="px-6 py-5 text-right">
             <app-action-button
                icon="pi pi-download"
                variant="ghost"
                customClass="!p-2 text-primary hover:bg-primary/10"
             ></app-action-button>
           </td>
         </tr>
       </tbody>
     </table>
   </div>
</app-ui-card>
