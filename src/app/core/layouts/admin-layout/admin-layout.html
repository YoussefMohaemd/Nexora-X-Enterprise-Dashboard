<div class="min-h-screen bg-bg flex text-text">
  <!-- Desktop Sidebar -->
  <aside
    [class.w-64]="isSidebarOpen()"
    [class.w-20]="!isSidebarOpen()"
    class="hidden lg:flex flex-col glass border-r border-white/5 transition-all duration-300 backdrop-blur-xl sticky top-0 h-screen"
  >
    <div class="p-6 flex items-center gap-3 overflow-hidden whitespace-nowrap">
      <div
        class="w-10 h-10 bg-primary shrink-0 rounded-xl flex items-center justify-center shadow-lg shadow-primary/20"
      >
        <i class="pi pi-bolt text-bg text-xl"></i>
      </div>
      <span *ngIf="isSidebarOpen()" class="text-xl font-bold text-text tracking-tight"
        >NexoraX</span
      >
    </div>

    <nav class="flex-grow px-3 py-4 space-y-2 overflow-y-auto">
      <ng-container *ngFor="let item of navItems">
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-primary/10 text-primary border-primary/20"
          [routerLinkActiveOptions]="{ exact: item.path === '/admin/dashboard' }"
          class="flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/5 transition-all duration-300 group border border-transparent"
        >
          <i
            [class]="'pi ' + item.icon + ' text-lg group-hover:scale-110 transition-transform'"
          ></i>
          <span *ngIf="isSidebarOpen()" class="font-medium text-sm">{{ item.label }}</span>
        </a>
      </ng-container>
    </nav>

    <div class="p-4 border-t border-white/5">
      <button
        (click)="toggleSidebar()"
        class="w-full flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/5 transition-colors text-muted hover:text-text"
      >
        <i [class]="'pi ' + (isSidebarOpen() ? 'pi-chevron-left' : 'pi-chevron-right')"></i>
        <span *ngIf="isSidebarOpen()" class="text-sm font-medium">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- Desktop Content Area -->
  <div class="flex-grow flex flex-col">
    <!-- Topbar -->
    <header
      class="glass h-16 border-b border-white/5 flex items-center justify-between px-4 md:px-8 sticky top-0 z-40 backdrop-blur-md"
    >
      <div class="flex items-center gap-4 flex-grow max-w-xl">
        <div class="relative w-full hidden md:block">
          <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-muted"></i>
          <input
            type="text"
            placeholder="Global search... (⌘K)"
            class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-12 pr-4 text-sm outline-none focus:border-primary/50 focus:bg-white/10 transition-all"
          />
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button
          class="p-2 rounded-xl text-muted hover:text-white hover:bg-white/5 transition-colors relative"
        >
          <i class="pi pi-bell"></i>
          <span
            class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full ring-2 ring-bg"
          ></span>
        </button>
        <button
          (click)="themeService.toggleDarkMode()"
          class="p-2.5 rounded-xl text-muted hover:text-primary hover:bg-primary/5 transition-all duration-300 border border-transparent hover:border-primary/10"
          [title]="themeService.darkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
        >
          <i [class]="'pi ' + (themeService.darkMode() ? 'pi-moon' : 'pi-sun') + ' text-lg'"></i>
        </button>

        <div class="h-8 w-px bg-white/10 mx-2"></div>

        <div class="relative">
          <button
            (click)="toggleUserDropdown()"
            class="flex items-center gap-3 pl-2 cursor-pointer group hover:bg-white/5 rounded-xl p-1 transition-all border border-transparent hover:border-white/10"
          >
            <div class="text-right hidden sm:block">
              <p class="text-xs font-bold text-text group-hover:text-primary transition-colors">
                {{ authService.currentUser()?.name ?? 'Guest User' }}
              </p>
              <p class="text-[10px] text-muted uppercase tracking-wider font-medium">
                {{ authService.currentUser()?.role ?? 'User' }}
              </p>
            </div>
            <div
              class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary p-0.5 shadow-lg shadow-primary/10 group-hover:shadow-primary/20 transition-all group-hover:scale-105"
            >
              <div
                class="w-full h-full rounded-[10px] bg-bg flex items-center justify-center overflow-hidden"
              >
                <img
                  [src]="
                    'https://ui-avatars.com/api/?name=' +
                    (authService.currentUser()?.name || 'User') +
                    '&background=0f172a&color=f59e0b'
                  "
                  alt="Avatar"
                />
              </div>
            </div>
          </button>

          <!-- Premium Dropdown Menu -->
          <div
            *ngIf="isUserDropdownOpen()"
            class="absolute right-0 mt-3 w-56 glass rounded-2xl border border-white/10 shadow-2xl py-2 z-50 animate-fade-in"
          >
            <div class="px-4 py-3 border-b border-white/5 mb-2">
              <p class="text-xs font-bold text-text truncate">
                {{ authService.currentUser()?.name }}
              </p>
              <p class="text-[10px] text-muted truncate">{{ authService.currentUser()?.email }}</p>
            </div>

            <button
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-muted hover:text-text hover:bg-white/5 transition-all"
            >
              <i class="pi pi-user text-xs"></i>
              <span>Profile Settings</span>
            </button>
            <button
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-muted hover:text-text hover:bg-white/5 transition-all"
            >
              <i class="pi pi-shield text-xs"></i>
              <span>Security</span>
            </button>

            <div class="h-px bg-white/5 my-2"></div>

            <button
              (click)="logout()"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-500/10 transition-all font-semibold"
            >
              <i class="pi pi-sign-out text-xs"></i>
              <span>Sign Out</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 max-w-[1600px] mx-auto w-full">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
