<div class="min-h-screen bg-bg flex text-text-primary">
  <!-- Desktop Sidebar -->
  <aside
    [class.w-64]="isSidebarOpen()"
    [class.w-20]="!isSidebarOpen()"
    class="hidden lg:flex flex-col bg-surface-0 border-r border-border transition-all duration-300 sticky top-0 h-screen"
  >
    <div class="p-6 flex items-center gap-3 overflow-hidden whitespace-nowrap">
      <div
        class="w-10 h-10 bg-primary shrink-0 rounded-xl flex items-center justify-center shadow-lg shadow-primary/20"
      >
        <i class="pi pi-bolt text-bg text-xl"></i>
      </div>
      <span *ngIf="isSidebarOpen()" class="text-xl font-bold text-text-primary tracking-tight"
        >NexoraX</span
      >
    </div>

    <nav class="flex-grow px-3 py-4 space-y-2 overflow-y-auto">
      <ng-container *ngFor="let item of navItems">
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-primary/10 text-primary border-primary/20 shadow-sm"
          [routerLinkActiveOptions]="{ exact: item.path === '/admin/dashboard' }"
          class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-50 transition-all duration-300 group border border-transparent hover:border-border hover:shadow-sm"
        >
          <i
            [class]="'pi ' + item.icon + ' text-lg group-hover:scale-110 transition-transform'"
          ></i>
          <span *ngIf="isSidebarOpen()" class="font-bold text-sm tracking-tight">{{ item.label }}</span>
        </a>
      </ng-container>
    </nav>

    <div class="p-4 border-t border-border">
      <button
        (click)="toggleSidebar()"
        class="w-full flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-surface-50 transition-colors text-text-muted hover:text-text-primary"
      >
        <i [class]="'pi ' + (isSidebarOpen() ? 'pi-chevron-left' : 'pi-chevron-right')"></i>
        <span *ngIf="isSidebarOpen()" class="text-sm font-bold">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- Desktop Content Area -->
  <div class="flex-grow flex flex-col">
    <!-- Topbar -->
    <header
      class="bg-surface-0 h-16 border-b border-border flex items-center justify-between px-4 md:px-8 sticky top-0 z-40"
    >
      <div class="flex items-center gap-4 flex-grow max-w-xl">
        <div class="search-box hidden md:block">
          <i class="pi pi-search"></i>
          <input type="text" placeholder="Global search... (⌘K)" />
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button
          class="p-2 rounded-xl text-text-muted hover:text-text-primary hover:bg-surface-50 transition-colors relative"
        >
          <i class="pi pi-bell"></i>
          <span
            class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full ring-2 ring-bg"
          ></span>
        </button>
        <button
          (click)="themeService.toggleDarkMode()"
          class="p-2.5 rounded-xl text-muted hover:text-primary hover:bg-primary/5 transition-all duration-300 border border-transparent hover:border-primary/10"
          [title]="themeService.darkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
        >
          <i [class]="'pi ' + (themeService.darkMode() ? 'pi-moon' : 'pi-sun') + ' text-lg'"></i>
        </button>

        <div class="h-8 w-px bg-border mx-2"></div>

        <div class="relative">
          <button
            (click)="toggleUserDropdown()"
            class="flex items-center gap-3 pl-2 cursor-pointer group hover:bg-surface-50 rounded-xl p-1 transition-all border border-transparent hover:border-border"
          >
            <div class="text-right hidden sm:block">
              <p
                class="text-xs font-bold text-text-primary group-hover:text-primary transition-colors"
              >
                {{ authService.currentUser()?.name ?? 'Guest User' }}
              </p>
              <p class="text-[11px] text-text-muted uppercase tracking-wider font-bold">
                {{ authService.currentUser()?.role ?? 'User' }}
              </p>
            </div>
            <div
              class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary p-0.5 shadow-lg shadow-primary/10 group-hover:shadow-primary/20 transition-all group-hover:scale-105"
            >
              <div
                class="w-full h-full rounded-[10px] bg-bg flex items-center justify-center overflow-hidden"
              >
                <img
                  [src]="
                    'https://ui-avatars.com/api/?name=' +
                    (authService.currentUser()?.name || 'User') +
                    '&background=0f172a&color=f59e0b'
                  "
                  alt="Avatar"
                />
              </div>
            </div>
          </button>

          <!-- Backdrop -->
          <div
            *ngIf="isUserDropdownOpen()"
            (click)="isUserDropdownOpen.set(false)"
            class="fixed inset-0 z-[60] bg-transparent"
          ></div>

          <!-- Premium Dropdown Menu -->
          <div
            *ngIf="isUserDropdownOpen()"
            class="absolute right-0 mt-3 w-56 bg-surface-0 rounded-2xl border border-border shadow-2xl py-2 z-[70] animate-fade-in"
          >
            <div class="px-4 py-3 border-b border-border mb-2">
              <p class="text-xs font-bold text-text-primary truncate">
                {{ authService.currentUser()?.name }}
              </p>
              <p class="text-[11px] text-text-muted truncate">
                {{ authService.currentUser()?.email }}
              </p>
            </div>

            <button
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-text-muted hover:text-primary hover:bg-primary/5 transition-all font-medium outline-none group"
            >
              <i class="pi pi-user text-xs group-hover:scale-110 transition-transform"></i>
              <span>Profile Settings</span>
            </button>
            <button
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-text-muted hover:text-primary hover:bg-primary/5 transition-all font-medium outline-none group"
            >
              <i class="pi pi-shield text-xs group-hover:scale-110 transition-transform"></i>
              <span>Security</span>
            </button>

            <div class="h-px bg-border my-2"></div>

            <button
              (click)="logout()"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-500/10 transition-all font-bold outline-none group"
            >
              <i class="pi pi-sign-out text-xs group-hover:scale-110 transition-transform"></i>
              <span>Sign Out</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 max-w-[1600px] mx-auto w-full">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
