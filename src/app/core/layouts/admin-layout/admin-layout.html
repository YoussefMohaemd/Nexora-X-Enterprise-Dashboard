  <div class="min-h-screen bg-bg flex text-text">
      <!-- Desktop Sidebar -->
      <aside [class.w-64]="isSidebarOpen()" [class.w-20]="!isSidebarOpen()" 
             class="hidden lg:flex flex-col glass border-r border-white/5 transition-all duration-300 backdrop-blur-xl sticky top-0 h-screen">
        <div class="p-6 flex items-center gap-3 overflow-hidden whitespace-nowrap">
          <div class="w-10 h-10 bg-primary shrink-0 rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
            <i class="pi pi-bolt text-bg text-xl"></i>
          </div>
          <span *ngIf="isSidebarOpen()" class="text-xl font-bold text-white tracking-tight">NexoraX</span>
        </div>

        <nav class="flex-grow px-3 py-4 space-y-2 overflow-y-auto">
          <ng-container *ngFor="let item of navItems">
            <a [routerLink]="item.path"
               routerLinkActive="bg-primary/10 text-primary border-primary/20"
               [routerLinkActiveOptions]="{exact: item.path === '/admin/dashboard'}"
               class="flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/5 transition-all duration-300 group border border-transparent">
              <i [class]="'pi ' + item.icon + ' text-lg group-hover:scale-110 transition-transform'"></i>
              <span *ngIf="isSidebarOpen()" class="font-medium text-sm">{{ item.label }}</span>
            </a>
          </ng-container>
        </nav>

        <div class="p-4 border-t border-white/5">
          <button (click)="toggleSidebar()" 
                  class="w-full flex items-center gap-4 px-3 py-3 rounded-xl hover:bg-white/5 transition-colors text-muted hover:text-white">
            <i [class]="'pi ' + (isSidebarOpen() ? 'pi-chevron-left' : 'pi-chevron-right')"></i>
            <span *ngIf="isSidebarOpen()" class="text-sm font-medium">Collapse</span>
          </button>
        </div>
      </aside>

      <!-- Desktop Content Area -->
      <div class="flex-grow flex flex-col">
        <!-- Topbar -->
        <header class="glass h-16 border-b border-white/5 flex items-center justify-between px-4 md:px-8 sticky top-0 z-40 backdrop-blur-md">
          <div class="flex items-center gap-4 flex-grow max-w-xl">
            <div class="relative w-full hidden md:block">
              <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-muted"></i>
              <input type="text" placeholder="Global search... (⌘K)" 
                     class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-12 pr-4 text-sm outline-none focus:border-primary/50 focus:bg-white/10 transition-all">
            </div>
          </div>

          <div class="flex items-center gap-4">
            <button class="p-2 rounded-xl text-muted hover:text-white hover:bg-white/5 transition-colors relative">
              <i class="pi pi-bell"></i>
              <span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full ring-2 ring-bg"></span>
            </button>
            <button (click)="themeService.toggleTheme()" 
                    class="p-2 rounded-xl text-muted hover:text-white hover:bg-white/5 transition-colors">
              <i [class]="'pi ' + (themeService.isDark() ? 'pi-moon' : 'pi-sun')"></i>
            </button>
            
            <div class="h-8 w-px bg-white/10 mx-2"></div>

            <div class="flex items-center gap-3 pl-2 cursor-pointer group">
              <div class="text-right hidden sm:block">
                <p class="text-xs font-semibold text-white group-hover:text-primary transition-colors">Ym099 User</p>
                <p class="text-[10px] text-muted uppercase tracking-wider">Super Admin</p>
              </div>
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary p-0.5 shadow-lg shadow-primary/10">
                <div class="w-full h-full rounded-[10px] bg-bg flex items-center justify-center overflow-hidden">
                   <img src="https://ui-avatars.com/api/?name=Ym099&background=0f172a&color=f59e0b" alt="Avatar">
                </div>
              </div>
            </div>
          </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow p-4 md:p-8 max-w-[1600px] mx-auto w-full">
          <router-outlet></router-outlet>
        </main>
      </div>
    </div>
